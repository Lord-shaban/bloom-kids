<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>الصفحة مش موجودة | بلوم كيدز</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/jpeg" href="/assets/images/logo.jpeg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+Bhaijaan+2:wght@600;800&family=Cairo:wght@600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Cairo", sans-serif;
      background: #fdf6ec; color: #332d6e;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 2rem;
    }
    .box img { width: 130px; height: 130px; border-radius: 50%; object-fit: cover; border: 4px solid #fff; box-shadow: 0 12px 30px rgba(51,45,110,.15); margin-bottom: 1.5rem; background: #fff; }
    h1 { font-family: "Baloo Bhaijaan 2", sans-serif; font-size: 4rem; font-weight: 800; color: #ef5f7c; line-height: 1; }
    h2 { font-family: "Baloo Bhaijaan 2", sans-serif; font-size: 1.6rem; margin: 0.6rem 0 0.4rem; }
    p { color: #5b568c; font-weight: 600; margin-bottom: 1.6rem; }
    a {
      display: inline-block; background: #ef5f7c; color: #fff; text-decoration: none;
      font-family: "Baloo Bhaijaan 2", sans-serif; font-weight: 700; font-size: 1.05rem;
      padding: 0.8rem 2rem; border-radius: 99px; box-shadow: 0 8px 20px rgba(239,95,124,.35);
      transition: transform .2s ease;
    }
    a:hover { transform: translateY(-3px); }
  </style>
</head>
<body>
  <div class="box">
    <img src="/assets/images/logo.jpeg" alt="شعار بلوم كيدز">
    <h1>404</h1>
    <h2>أوبس! الصفحة دي مش موجودة 🙈</h2>
    <p>يمكن اللينك اتغير أو اتكتب غلط.. بس متقلقش، البيت قريب!</p>
    <a href="/">ارجع للصفحة الرئيسية 🏠</a>
  </div>
</body>
</html>
